services:
  postgres:
    image: postgres:16.13-alpine3.23
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - transparence-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    ports:
      - "8000:8000"
    networks:
      - transparence-network


networks:
  transparence-network:
    driver: bridge

volumes:
  postgres_data: