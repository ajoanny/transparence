name: Pipeline CI/CD
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  Setup:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

  Lint:
    runs-on: ubuntu-latest
    needs: Setup
    container:
      image: python:3.12-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies for tests
        run: pip install -r dev-requirements.txt

      - name: Run linter
        run: flake8 .

      - name: Format code
        run: black --check .

  Tests:
      runs-on: ubuntu-latest
      needs: Setup
      container:
        image: python:3.12-slim
      env:
        DB_NAME: transparence-test
        DB_USER: user
        DB_PASSWORD: password
        DB_HOST: postgres
        DB_PORT: 5432
      services:
        postgres:
          image: postgres:16.13-alpine3.23
          env:
            POSTGRES_USER: ${{ env.DB_USER }}
            POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
            POSTGRES_DB: ${{ env.DB_NAME }}
          ports:
            - 5432:5432
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - uses: actions/setup-python@v6
          with:
            cache: 'pip'

        - name: Upgrade pip
          run: python -m pip install --upgrade pip

        - name: Install dependencies for tests
          run: pip install -r dev-requirements.txt

        - name: Run migrations
          run: python manage.py migrate

        - name: Run tests
          run: pytest --rich
